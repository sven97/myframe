services:
  myframe:
    # Pull the prebuilt multi-arch image from GHCR (works on Intel & ARM Synology).
    # To build from source on the NAS instead, comment out `image:` and use `build: .`
    image: ghcr.io/sven97/myframe:latest
    # build: .
    container_name: myframe
    ports:
      - "8080:8080"
    volumes:
      - /volume1/photo:/photos:ro
      - ./config:/config
    environment:
      # How often (minutes) to rescan the photo folders for new images. 0 disables.
      - RESCAN_INTERVAL_MIN=60
    restart: unless-stopped
